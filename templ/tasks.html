{{ define "task" }}
	<h3>{{ .Name }}</h3>
	<p>{{ .Desc }}</p>
	<p>Completed: {{ .Completed }}</p>

	<label for=completed>Completed:</label>
	<input type=checkbox {{if .Completed }} checked {{end}}>
{{ end }}

{{ block "tasks" . }}
	{{ range $key, $task := . }}
	<div id="{{ $key }}">
		{{ template "task" . }}
		<button
			class="delete"
			hx-delete="/task/{{ $key }}">
			Delete
		</button>
	</div>
	{{ end }}
{{ end }}
