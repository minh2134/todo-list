{{ define "task" }}
<div class="h-max w-full rounded px-3 py-2 text-wrap">
	<h3 class="font-sans text-base font-bold text-current antialiased md:text-lg lg:text-xl">
		{{ .Name }}    
	</h3>
	<p class="my-1 font-sans text-base text-slate-600 antialiased">
		{{ .Desc }}
	</p>
</div>
{{ end }}

{{ block "tasks" . }}
	{{ range $key, $task := . }}
	<div 
		class="w-full max-w-xs overflow-hidden rounded-lg border border-slate-200 bg-white shadow-lg flex flex-col"
		id="{{ $key }}"
		hx-patch="/task/{{ $key }}?toggle=true"
		hx-trigger="change"
		hx-swap=none>

		{{ template "task" . }}
	
		<div class="bottom-0 flex justify-end gap-x-2 gap-y-1 w-full rounded px-3 pb-3 pt-1.5 mt-auto">
			<div>
				<label for=completed>Completed:</label>
				<input type=checkbox {{if .Completed }} checked {{end}}>
			</div>
			<button
				class="delete w-1/4 rounded-md border border-slate-800 bg-slate-800 px-4 py-2 text-center font-sans text-sm font-medium text-slate-50 hover:border-slate-700 hover:bg-slate-700 disabled:cursor-not-allowed disabled:opacity-50 disabled:shadow-none ml-auto"
				hx-delete="/task/{{ $key }}">
				Delete
			</button>
			<button
				class="w-1/4 rounded-md border border-slate-800 bg-slate-800 px-4 py-2 text-center font-sans text-sm font-medium text-slate-50 hover:border-slate-700 hover:bg-slate-700 disabled:cursor-not-allowed disabled:opacity-50 disabled:shadow-none"
				hx-get="/task/{{ $key }}"
				hx-swap=innerHTML
				hx-target="#edit">

				Edit
			</button>
		</div>
	</div>
	{{ end }}
{{ end }}
